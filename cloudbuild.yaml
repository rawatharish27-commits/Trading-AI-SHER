# Google Cloud Build Configuration for SHER.AI
# Automated CI/CD pipeline for Cloud Run deployment

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/sher-ai:$COMMIT_SHA', '-t', 'gcr.io/$PROJECT_ID/sher-ai:latest', '.']

  # Step 2: Push Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sher-ai:$COMMIT_SHA']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sher-ai:latest']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'sher-ai-trading'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sher-ai:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '300s'

# Image definitions
images:
  - 'gcr.io/$PROJECT_ID/sher-ai:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/sher-ai:latest'
