
version: '3.8'

services:
  # The Main Sher Application (Next.js + Python)
  web:
    build: .
    container_name: sher_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://sher_user:sher_password@db:5432/sher_db
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=changeme_in_production_secret_key_123
      - NODE_ENV=production
      # Add your Gemini API Key here or in a .env file
      - API_KEY=${API_KEY}
    depends_on:
      - db
    networks:
      - sher_network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: sher_db
    restart: always
    environment:
      - POSTGRES_USER=sher_user
      - POSTGRES_PASSWORD=sher_password
      - POSTGRES_DB=sher_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sher_network

networks:
  sher_network:
    driver: bridge

volumes:
  postgres_data:
