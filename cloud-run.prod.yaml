# GCP Cloud Run Deployment Configuration
# Trading AI SHER - Production Deployment

apiVersion: apps/v1
kind: Service

metadata:
  name: trading-ai-sher
  namespace: default
  labels:
    app: trading-ai-sher
    version: "4.5.0"
    environment: production
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all
    run.googleapis.com/health-check-path: /api/health
    run.googleapis.com/execution-environment: gen2

spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/gke-backend: "1.26.2"
        run.googleapis.com/client-secret-data: "true"
        run.googleapis.com/enable-secret-manager: "true"
        autoscaling.knative.dev/max-scale: "10"
        autoscaling.knative.dev/min-scale: "1"

    spec:
      # ===========================================
      # CONTAINER CONFIGURATION
      # ===========================================
      containers:
        - name: trading-ai-sher
          image: gcr.io/PROJECT_ID/trading-ai-sher:latest

          # ===========================================
          # PORTS
          # ===========================================
          ports:
            - containerPort: 8080

          # ===========================================
          # ENVIRONMENT VARIABLES (SERVER-SIDE SECRETS)
          # ===========================================
          env:
            # Server Configuration
            - name: NODE_ENV
              value: "production"

            - name: PORT
              value: "8080"

            # ===========================================
            # SECRETS (INJECTED FROM GCP SECRET MANAGER)
            # ===========================================
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  optional: true

            - name: ANGEL_ONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: angel-one-api-key
                  optional: true

            - name: ANGEL_ONE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: angel-one-client-id
                  optional: true

            - name: ANGEL_ONE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: angel-one-password
                  optional: true

            - name: ANGEL_ONE_TOTP_SECRET
              valueFrom:
                secretKeyRef:
                  name: angel-one-totp-secret
                  optional: true

            # Auth
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: nextauth-secret

            - name: NEXTAUTH_URL
              value: "https://trading-ai-sher-YOUR_PROJECT_NAME.an.a.run.app"

            # Database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  optional: true

            # Rate Limiting
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-url
                  optional: true

            # Stripe
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-secret-key
                  optional: true

            # JWT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret

            # Google OAuth
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: google-client-id
                  optional: true

            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: google-client-secret
                  optional: true

            # Logging
            - name: LOG_LEVEL
              value: "info"

            - name: LOG_FORMAT
              value: "json"

            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: sentry-dsn
                  optional: true

          # ===========================================
          # CLIENT-SIDE ENVIRONMENT VARIABLES
          # ===========================================
          envFrom:
            - configMapRef:
                name: trading-ai-sher-config

          # ===========================================
          # RESOURCE LIMITS
          # ===========================================
          resources:
            limits:
              cpu: "2"
              memory: "2048Mi"
            requests:
              cpu: "500m"
              memory: "512Mi"

          # ===========================================
          # LIVENESS PROBE (CONTAINER HEALTH CHECK)
          # ===========================================
          livenessProbe:
            httpGet:
              path: /api/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          # ===========================================
          # READINESS PROBE (TRAFFIC ACCEPTANCE CHECK)
          # ===========================================
          readinessProbe:
            httpGet:
              path: /api/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          # ===========================================
          # STARTUP PROBE (INITIAL LOAD CHECK)
          # ===========================================
          startupProbe:
            httpGet:
              path: /api/health/startup
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
            successThreshold: 1

      # ===========================================
      # AUTO-SCALING CONFIGURATION
      # ===========================================
      timeoutSeconds: 300
      concurrency: 80
      taskTimeoutSeconds: 600

      # ===========================================
      # SECRETS (REQUIRED FOR DEPLOYMENT)
      # ===========================================
      serviceAccountName: PROJECT_NUMBER-compute@developer.gserviceaccount.com

  # ===========================================
  # TRAFFIC SPLIT (BLUE-GREEN DEPLOYMENT)
  # ===========================================
  traffic:
    - revisionName: trading-ai-sher-v450
      percent: 100

# ===========================================
# AUTOSCALING POLICY
# ===========================================
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: trading-ai-sher-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Service
    name: trading-ai-sher
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
