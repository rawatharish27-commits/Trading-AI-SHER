# Cloud Run Service Configuration for SHER.AI Trading Platform
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: sher-ai-trading
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/autoscaling-scale-to-zero: "true"
        autoscaling.knative.dev/maxScale: "10"
        autoscaling.knative.dev/minScale: "0"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
      - name: sher-ai
        image: gcr.io/PROJECT_ID/sher-ai:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 2000m
            memory: 2Gi
        env:
        # Node Configuration
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "8080"
        # Market Configuration
        - name: MARKET_MODE
          value: "PAPER"
        # AI API (Google Gemini)
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: api-key-secret
              key: API_KEY
        # Angel One Broker Credentials
        - name: ANGEL_ONE_API_KEY
          valueFrom:
            secretKeyRef:
              name: broker-credentials
              key: API_KEY
        - name: ANGEL_ONE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: broker-credentials
              key: CLIENT_ID
        - name: ANGEL_ONE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: broker-credentials
              key: PASSWORD
        - name: ANGEL_ONE_TOTP_SECRET
          valueFrom:
            secretKeyRef:
              name: broker-credentials
              key: TOTP_SECRET
        # Database
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-url
              key: CONNECTION_STRING
        # Optional: Cloud SQL
        - name: CLOUDSQL_CONNECTION
          value: "PROJECT:REGION:INSTANCE"
